<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KnockBox Games</title>
  <link rel="stylesheet" href="/home.css" />
</head>
<body>
  <!-- ── Home view ─────────────────────────────────────────────────────── -->
  <section id="lobby-view" class="home-container">
    <div class="hero-banner">
      <div class="hero-ribbon" aria-hidden="true">
        <div class="hero-ribbon-track">
          <div class="hero-ribbon-tile"></div>
          <div class="hero-ribbon-tile"></div>
        </div>
      </div>
      <div class="hero">
        <h1 class="title">
          <span class="title-letter" aria-hidden="true">K</span>
          <span class="title-letter" aria-hidden="true">N</span>
          <span class="title-letter" aria-hidden="true">O</span>
          <span class="title-letter" aria-hidden="true">C</span>
          <span class="title-letter" aria-hidden="true">K</span>
          <span class="title-letter" aria-hidden="true">B</span>
          <span class="title-letter" aria-hidden="true">O</span>
          <span class="title-letter" aria-hidden="true">X</span>
          <span class="sr-only">KnockBox</span>
        </h1>
      </div>
    </div>
    <p class="hero-tagline">Imagine Jackbox, but worse.</p>

    <form id="join-form" autocomplete="off">
      <div class="join-section">
        <div class="join-card">
          <label class="join-label" for="player-name-input">Player Name</label>
          <input id="player-name-input"
                 placeholder="Enter a name to start playing!"
                 type="text" maxlength="20" name="player-name" />
        </div>

        <div class="join-card">
          <label class="join-label" for="room-code-input">Room Code</label>
          <div class="join-code-row">
            <input id="room-code-input"
                   placeholder="AB12"
                   type="text" maxlength="4" name="room-code"
                   autocapitalize="characters" autocorrect="off" spellcheck="false" />
            <button type="submit" id="join-btn" class="join-btn" disabled>Join</button>
          </div>
        </div>
      </div>
    </form>

    <div class="home-main">
      <div class="games-section">
        <h2 class="games-heading">Host a Game</h2>
        <div id="games" class="game-grid"></div>
      </div>

      <aside class="home-playlog">
        <section class="pl-panel" aria-label="Play Log">
          <h2 class="pl-heading">Play Log</h2>
          <div class="pl-state pl-empty" id="playlog-empty" role="status">
            <span class="pl-state-icon" aria-hidden="true">&#127922;</span>
            <span class="pl-empty-title">No games played yet</span>
            <span class="pl-empty-sub">Your game activity will show up here.</span>
          </div>
          <ul class="pl-list" id="playlog-list" hidden></ul>
        </section>
      </aside>
    </div>
  </section>

  <!-- ── In-game / waiting view ────────────────────────────────────────── -->
  <section id="game-view">
    <div class="game-shell">
      <header class="game-header">
        <a class="game-header-title" id="game-title" href="/"></a>
        <div class="header-actions">
          <button type="button" class="room-code-btn" id="room-code-btn" title="Click to reveal · double-click to enlarge · right-click/long-press to copy · middle-click to join in a new tab">
            <span class="room-code-face room-code-label">Room Code</span>
            <span class="room-code-face room-code-value" id="lobby-code"></span>
          </button>
          <button class="leave-session-btn" id="leave">Leave</button>
        </div>
      </header>
      <div class="game-body">
        <div id="waiting"></div>
        <div id="frame-host"></div>
      </div>
    </div>
  </section>

  <!-- ── Room code modal (double-click / mobile-friendly large view) ─────────── -->
  <div class="rc-modal" id="rc-modal" hidden role="dialog" aria-modal="true" aria-labelledby="rc-modal-title">
    <div class="rc-modal-backdrop" data-rc-close></div>
    <div class="rc-modal-card">
      <button type="button" class="rc-modal-close" id="rc-modal-close" aria-label="Close" data-rc-close>×</button>
      <p class="rc-modal-heading" id="rc-modal-title">Room Code</p>
      <p class="rc-modal-code" id="rc-modal-code"></p>
      <div class="rc-modal-actions">
        <button type="button" class="rc-modal-copy" id="rc-modal-copy">Copy code</button>
        <button type="button" class="rc-modal-copy secondary" id="rc-modal-copy-link">Copy Join Link</button>
      </div>
    </div>
  </div>

  <span id="conn" hidden>connecting…</span>

  <script type="module">import { bootstrap } from '/shell.js?v=5'; bootstrap();</script>
</body>
</html>
