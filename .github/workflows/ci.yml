name: CI

on:
  push:
    branches: [main, 'feat/**', 'fix/**']
    # Release tags (v1.2.3) re-run the suite on the tagged commit and trigger the publish job.
    tags: ['v*']
  pull_request:
    branches: [main]

# Least-privilege default for GITHUB_TOKEN: the test/build jobs only check out and build/test, so
# read-only contents is sufficient. The lone exception is the `publish` job, which grants itself
# `packages: write` at job level (below) to push images to GHCR — nothing else can write packages.
permissions:
  contents: read

jobs:
  dotnet:
    name: .NET build & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - run: dotnet test KnockBox-Games.slnx --nologo

  aot:
    name: Native AOT publish (warnings gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      # Native AOT compiles to a native object and links it via clang against zlib; the SDK doesn't
      # ship the toolchain (mirrors the Dockerfile's build stage).
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends clang zlib1g-dev
      # The full ILC compile is the only thing that surfaces trim/AOT (ILxxxx) warnings; /warnaserror
      # fails the build on any new one, so the app stays AOT-clean as code and dependencies change.
      - run: dotnet publish KnockBox.Server -r linux-x64 -c Release /warnaserror

  web:
    name: Web (shell + SDK) tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm test

  clients-phaser:
    name: Phaser client tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/phaser
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: clients/phaser/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test

  pack-game:
    name: pack-game tool tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/pack-game
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: tools/pack-game/package-lock.json
      - run: npm ci
      - run: npm test

  docker:
    name: Docker image build & smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3

      # Build via buildx so the layers land in the gha cache that the publish job reuses — the
      # published image is then a cache-hit rebuild of these exact, smoke-tested layers, not a
      # separate build. `load` puts the image in the local daemon so the `docker run` smoke test
      # below can use the `knockbox:ci` tag.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: KnockBox.Server/Dockerfile
          load: true
          tags: knockbox:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container with an empty mounted games dir
        run: |
          mkdir -p /tmp/kb-games
          docker run -d --name kb \
            -p 8080:8080 -p 8081:8081 \
            -v /tmp/kb-games:/games:ro \
            -e KnockBox__GamesPollSeconds=2 \
            knockbox:ci

      - name: Shell serves from the baked-in web root
        run: |
          for i in $(seq 1 30); do
            curl -fsS http://localhost:8080/ >/dev/null 2>&1 && break
            sleep 1
          done
          curl -fsS http://localhost:8080/ | grep -qi '<html'
          curl -fsS http://localhost:8080/shell.js >/dev/null
          curl -fsS http://localhost:8081/knockbox.js >/dev/null

      - name: Hot drop-in — game appears via the polling fallback
        run: |
          cp -r games/tictactoe /tmp/kb-games/
          for i in $(seq 1 30); do
            # Fail fast (with logs) if the container died, instead of spinning the full 30s.
            [ "$(docker inspect -f '{{.State.Running}}' kb 2>/dev/null)" = "true" ] \
              || { echo "Container is not running:"; docker logs kb 2>&1; exit 1; }
            docker logs kb 2>&1 | grep -q "Discovered game 'tictactoe'" && break
            sleep 1
          done
          docker logs kb 2>&1 | grep "Discovered game 'tictactoe'"
          # ...and its assets serve from the game origin.
          curl -fsS http://localhost:8081/games/tictactoe/GAME.json >/dev/null
          curl -fsS http://localhost:8081/games/tictactoe/index.html >/dev/null

      - name: Shell origin exposes only the thumbnail, never the full game build
        run: |
          # Isolation guarantee: the untrusted build must NOT be reachable on the shell origin (8080),
          # or it could run there and read the identity token. Only the declared thumbnail is allowed.
          curl -fsS http://localhost:8080/games/tictactoe/thumb.svg >/dev/null
          ! curl -fsS http://localhost:8080/games/tictactoe/index.html >/dev/null
          ! curl -fsS http://localhost:8080/games/tictactoe/GAME.json >/dev/null

      - name: Startup logs are sane (no blank-site error, roots resolved)
        run: |
          docker logs kb 2>&1 | grep -q "Content roots"
          ! docker logs kb 2>&1 | grep -q "has no index.html"

      - name: Dump container logs
        if: always()
        run: docker logs kb 2>&1 || true

      - name: Cleanup
        if: always()
        run: docker rm -f kb || true

  publish:
    name: Publish image to GHCR
    runs-on: ubuntu-latest
    # Only publish green commits: gate on every test/build job above.
    needs: [dotnet, aot, web, clients-phaser, pack-game, docker]
    # Publish only on main (→ :develop) and v* tags (→ :latest + version tags). Never on PRs or
    # feature branches — those run the suite but produce no image.
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    # Serialize publishes for a given ref so two quick main pushes can't race on the :develop tag.
    # cancel-in-progress: false — never abort a push mid-flight; let it finish, then run the next.
    concurrency:
      group: publish-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write   # push images to GHCR with the built-in GITHUB_TOKEN — no extra secrets
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Compute tags from the trigger: main → :develop; a v* tag → :latest + :MAJOR.MINOR.PATCH +
      # :MAJOR.MINOR. metadata-action lowercases the image name (jcub1011/KnockBox-Games →
      # ghcr.io/jcub1011/knockbox-games), and `latest=auto` adds :latest ONLY on semver tag builds.
      # Caveat: latest=auto only sees the current ref, not the registry — pushing an OLDER v* tag
      # would move :latest backward, so push version tags in increasing order.
      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          flavor: latest=auto

      # Reuses the gha cache the `docker` smoke-test job warmed (this job `needs` it), so the
      # pushed image is a cache-hit rebuild of the exact layers that were just smoke-tested — not a
      # fresh, unvalidated build. Single-platform (linux-x64/amd64) matches the Dockerfile's
      # `-r linux-x64` AOT publish — no QEMU/multi-arch needed — and the cache makes the slow AOT
      # compile a no-op on the common path.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: KnockBox.Server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
