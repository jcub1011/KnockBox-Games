<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: #f4f5f8; color: #1a1d27;
      display: flex; flex-direction: column; align-items: center; gap: 1rem; padding: 1.5rem; }
    #turn { font-size: 1.1rem; font-weight: 600; min-height: 1.4rem; }
    #board { display: grid; grid-template-columns: repeat(3, 96px); grid-template-rows: repeat(3, 96px); gap: 8px; }
    .cell { background: #fff; border: 2px solid #d4d7e0; border-radius: 10px; font-size: 3rem;
      font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center;
      user-select: none; }
    .cell:hover { border-color: #4257f5; }
    .cell.x { color: #f5a623; }
    .cell.o { color: #4257f5; }
    .cell:disabled { cursor: default; }
    #banner { font-size: 1.2rem; font-weight: 700; min-height: 1.5rem; color: #2a8f4a; }
  </style>
</head>
<body>
  <div id="turn">Connecting…</div>
  <div id="board"></div>
  <div id="banner"></div>

  <script type="module" src="/knockbox.js"></script>
  <script type="module" src="game.js"></script>
</body>
</html>
